<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Overlay</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h1>Pet Overlay</h1>
      <div class="group">
        <div class="group-label">Behaviour Weights</div>
        <div class="slider-row">
          <label>Wander Force<span class="val" id="wanderVal"></span></label>
          <input type="range" id="wanderWeight" min="0" max="1.5" step="0.05" />
        </div>
        <div class="slider-row">
          <label>Wall Avoidance <span class="val" id="wallVal"></span></label>
          <input type="range" id="wallWeight" min="0" max="4" step="0.1" />
        </div>
        <div class="slider-row">
          <label>Seek Force <span class="val" id="seekVal"></span></label>
          <input type="range" id="seekWeight" min="0" max="3" step="0.05" />
        </div>
      </div>
      <div class="group">
        <div class="group-label">Pet Properties</div>
        <div class="slider-row">
          <label>Pet Size <span class="val" id="sizeVal"></span></label>
          <input type="range" id="petSize" min="0.1" max="3" step="0.05" />
        </div>
        <div class="slider-row">
          <label>Max Speed <span class="val" id="speedVal"></span></label>
          <input type="range" id="maxSpeed" min="0.5" max="8" step="0.25" />
        </div>
        <div class="slider-row">
          <label>Wander Radius <span class="val" id="radiusVal"></span></label>
          <input type="range" id="wanderRadius" min="10" max="120" step="5" />
        </div>
        <div class="slider-row">
          <label>Feeler Length <span class="val" id="feelerVal"></span></label>
          <input type="range" id="feelerLength" min="20" max="150" step="5" />
        </div>
        <div class="slider-row">
          <label>Eat Time (s) <span class="val" id="eatVal"></span></label>
          <input type="range" id="eatDuration" min="0.2" max="4" step="0.1" />
        </div>
      </div>

      <div class="group">
        <div class="group-label">Telemetry</div>
        <div class="telemetry">
          <div class="telem-item">
            <div class="tl">Speed</div>
            <div class="tv" id="tSpeed">0.0</div>
          </div>
          <div class="telem-item">
            <div class="tl">Heading</div>
            <div class="tv" id="tHeading">0°</div>
          </div>
          <div class="telem-item">
            <div class="tl">State</div>
            <div class="tv" id="tState">WANDER</div>
          </div>
        </div>
      </div>

      <div class="group">
        <div class="group-label">Controls</div>
        <div class="btn-row">
          <button id="btnPause">Pause</button>
          <button id="btnReset">Reset</button>
        </div>
        <div class="btn-row">
          <button id="btnDebug" class="active">Debug Vis</button>
        </div>
      </div>
      <div class="group">
        <div class="group-label">Food</div>
        <div class="btn-row">
          <button id="btnSpawnFood">Spawn Food</button>
          <button id="btnAutoSpawn">Auto Spawn</button>
        </div>
        <div class="btn-row">
          <button id="btnClearFood">Clear Food</button>
        </div>
        <div class="hint">Click the canvas to place food.</div>
      </div>
      <div class="group">
        <div class="group-label">Legend</div>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-dot" style="background: #7ee8a2"></div>
            Pet velocity vector
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: #5ec4d4"></div>
            Wander circle
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: #e87e7e"></div>
            Wall feelers &amp; avoidance
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: #9be870"></div>
            Food &amp; seek target
          </div>
        </div>
      </div>
    </div>

    <div id="canvas-wrap">
      <div id="fps">0 FPS</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
